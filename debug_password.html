<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Debug Password</title>
<style>
  body { font-family: Arial; padding: 30px; max-width: 700px; margin: auto; }
  h1 { color: #1B3A6B; }
  input { font-size: 18px; padding: 10px; width: 100%; }
  .out { background: #f0f0f0; padding: 12px; margin-top: 10px; border-radius: 4px; font-family: monospace; word-break: break-all; }
  .ok { color: green; font-weight: bold; }
  .bad { color: red; font-weight: bold; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  td { border: 1px solid #ccc; padding: 6px; text-align: center; font-family: monospace; }
  .esperado { background: #DFF2D8; }
</style></head>
<body>
<h1>Diagnóstico de Contraseña</h1>
<p>Escribe la contraseña <strong>HivimarSCVOC</strong> en el campo de abajo. Te muestro byte por byte lo que estás tecleando.</p>
<input id="pwd" placeholder="Escribe la contraseña aquí" autocomplete="off">
<div class="out" id="out">Esperando texto...</div>

<h2>Comparativo</h2>
<p>Lo que <strong>esperamos</strong> recibir vs lo que <strong>tú envías</strong>:</p>
<div id="cmp"></div>

<script>
const ESPERADO = "HivimarSCVOC";
const inp = document.getElementById("pwd");
const out = document.getElementById("out");
const cmp = document.getElementById("cmp");

inp.addEventListener("input", () => {
  const v = inp.value;
  const bytes = new TextEncoder().encode(v);
  const hex = Array.from(bytes).map(b => b.toString(16).padStart(2,'0')).join(' ');

  out.innerHTML = `
    <div>Texto: <strong>"${v}"</strong></div>
    <div>Longitud caracteres: ${v.length}</div>
    <div>Longitud bytes UTF-8: ${bytes.length}</div>
    <div>Bytes hex: ${hex}</div>
    <div>${v === ESPERADO ? '<span class="ok">✓ COINCIDE EXACTAMENTE con HivimarSCVOC</span>'
                          : '<span class="bad">✗ NO COINCIDE con HivimarSCVOC</span>'}</div>
  `;

  // Tabla comparativa char por char
  const max = Math.max(v.length, ESPERADO.length);
  let html = '<table><tr><th>Pos</th>';
  for (let i = 0; i < max; i++) html += `<th>${i+1}</th>`;
  html += '</tr><tr class="esperado"><td>Esperado</td>';
  for (let i = 0; i < max; i++) html += `<td>${ESPERADO[i] || '-'}</td>`;
  html += '</tr><tr><td>Tu texto</td>';
  for (let i = 0; i < max; i++) {
    const c = v[i] || '-';
    const ok = c === ESPERADO[i];
    html += `<td style="background:${ok?'#DFF2D8':'#F8D7D7'}">${c}</td>`;
  }
  html += '</tr><tr><td>Code</td>';
  for (let i = 0; i < max; i++) {
    const c = v.charCodeAt(i);
    html += `<td>${isNaN(c)?'-':c}</td>`;
  }
  html += '</tr></table>';
  cmp.innerHTML = html;
});
</script>
</body></html>
